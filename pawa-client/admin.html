<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Pawa-Client</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .admin-container {
            max-width: 800px;
            margin: 100px auto;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            color: #fff;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        .pass-list {
            list-style: none;
            padding: 0;
        }
        .pass-item {
            display: flex;
            justify-content: space-between;
            background: #2a2a2a;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            align-items: center;
        }
        .key-status {
            font-size: 0.85rem;
            padding: 4px 8px;
            border-radius: 4px;
            margin-left: 10px;
        }
        .status-active { background: #2ecc71; color: #000; }
        .status-used { background: #e74c3c; color: #fff; }
        .btn-danger {
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-danger:hover {
            background: #ff6b81;
        }
        .add-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .admin-input {
            flex: 1;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #444;
            background: #222;
            color: #fff;
            font-family: inherit;
        }
        #login-error {
            color: #ff4757;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <a href="index.html" class="logo">Padawan985</a>
        <div class="nav-links">
            <a href="pawa-client.html" class="nav-link">Zurück zum Client</a>
        </div>
    </div>
</nav>

<div class="admin-container" id="login-screen">
    <h2>Admin Login</h2>
    <p>Bitte logge dich mit deinem Supabase-Account ein.</p>
    <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px; max-width: 400px;">
        <input type="email" id="admin-email" class="admin-input" placeholder="E-Mail Adresse...">
        <input type="password" id="admin-pass" class="admin-input" placeholder="Passwort...">
        <button onclick="login()" class="btn btn-primary" style="border: none;">Login</button>
        <p id="login-error">Login fehlgeschlagen. Bitte prüfe deine Daten.</p>
    </div>
</div>

<div class="admin-container" id="dashboard-screen" style="display: none;">
    <div class="admin-header">
        <h2>Beta-Key Verwaltung</h2>
        <button onclick="logout()" class="btn btn-secondary" style="border: none;">Logout</button>
    </div>

    <div class="add-controls">
        <input type="text" id="new-key" class="admin-input" placeholder="Neuen Access-Key eingeben (z.B. beta-2026)...">
        <button onclick="addKey()" class="btn btn-primary" style="border: none;">Key hinzufügen</button>
    </div>

    <h3>Aktive & Verwendete Keys</h3>
    <ul class="pass-list" id="key-list">
        <li class="pass-item">Lade Keys...</li>
    </ul>
</div>

<script>
    // Supabase Initialisierung mit deinen Daten
    const supabaseUrl = 'https://bduypfymatnkgjlwzzoi.supabase.co';
    const supabaseKey = 'sb_publishable_upzUkUE4lKwZqpd9FUyQng_v264SGfx';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    // Prüft beim Laden der Seite, ob du schon eingeloggt bist
    window.onload = async () => {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            showDashboard();
        }
    };

    // --- LOGIN & LOGOUT LOGIK ---

    async function login() {
        const email = document.getElementById('admin-email').value;
        const password = document.getElementById('admin-pass').value;
        const errorMsg = document.getElementById('login-error');

        const { data, error } = await supabase.auth.signInWithPassword({
            email: email,
            password: password,
        });

        if (error) {
            errorMsg.style.display = 'block';
            errorMsg.innerText = error.message;
        } else {
            errorMsg.style.display = 'none';
            document.getElementById('admin-email').value = '';
            document.getElementById('admin-pass').value = '';
            showDashboard();
        }
    }

    async function logout() {
        await supabase.auth.signOut();
        document.getElementById('login-screen').style.display = 'block';
        document.getElementById('dashboard-screen').style.display = 'none';
    }

    function showDashboard() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard-screen').style.display = 'block';
        fetchKeys(); // Lädt die Keys aus der Datenbank
    }

    // --- DATENBANK LOGIK (KEYS VERWALTEN) ---

    async function fetchKeys() {
        const list = document.getElementById('key-list');
        list.innerHTML = '<li class="pass-item">Lade Keys...</li>';

        // Holt alle Keys, sortiert nach Erstellungsdatum (neueste zuerst)
        const { data: keys, error } = await supabase
            .from('beta_keys')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            list.innerHTML = `<li class="pass-item" style="color: #ff4757;">Fehler: ${error.message}</li>`;
            return;
        }

        list.innerHTML = ''; // Liste leeren

        if (keys.length === 0) {
            list.innerHTML = '<li class="pass-item">Keine Keys vorhanden. Erstelle deinen ersten!</li>';
            return;
        }

        // Baut die HTML-Liste basierend auf der Datenbank auf
        keys.forEach(keyObj => {
            const statusClass = keyObj.is_used ? 'status-used' : 'status-active';
            const statusText = keyObj.is_used ? 'Benutzt' : 'Aktiv';
            
            const li = document.createElement('li');
            li.className = 'pass-item';
            li.innerHTML = `
                <div>
                    <strong>${keyObj.key}</strong> 
                    <span class="key-status ${statusClass}">${statusText}</span>
                </div>
                <button class="btn-danger" onclick="deleteKey('${keyObj.id}')">Löschen</button>
            `;
            list.appendChild(li);
        });
    }

    async function addKey() {
        const input = document.getElementById('new-key');
        const keyValue = input.value.trim();
        
        if (!keyValue) {
            alert("Bitte gib einen Key ein.");
            return;
        }

        const { data, error } = await supabase
            .from('beta_keys')
            .insert([{ key: keyValue }]);

        if (error) {
            // Zeigt Fehler, z.B. wenn der Key schon existiert (UNIQUE constraint)
            alert("Fehler beim Erstellen: " + error.message);
        } else {
            input.value = '';
            fetchKeys(); // Liste aktualisieren
        }
    }

    async function deleteKey(id) {
        if (!confirm("Diesen Key wirklich löschen?")) return;

        const { error } = await supabase
            .from('beta_keys')
            .delete()
            .eq('id', id);

        if (error) {
            alert("Fehler beim Löschen: " + error.message);
        } else {
            fetchKeys(); // Liste aktualisieren
        }
    }
</script>

</body>
</html>

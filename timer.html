<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MADE BY PADAWAN985</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .brand {
            font-size: clamp(24px, 5vw, 40px);
            font-weight: 900;
            letter-spacing: 3px;
            text-align: center;
        }

        .timer {
            margin-top: 20px;
            font-size: 20px;
            font-family: monospace;
            color: #444444; /* Abgedunkeltes Grau, damit es nicht ablenkt */
        }
    </style>
</head>
<body>

    <div class="brand">MADE BY PADAWAN985</div>
    <div class="timer" id="timer">15</div>

    <script>
        let timeLeft = 15;
        const timerElement = document.getElementById('timer');

        const countdown = setInterval(() => {
            timeLeft--;
            timerElement.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerElement.textContent = "DONE";
                timerElement.style.color = "#10b981"; // Wird dezent grün, wenn fertig
            }
        }, 1000);
    </script>

</body>
</html>

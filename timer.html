<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Info & Timer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f5f5f7;
            color: #1d1d1f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .btn {
            background-color: #0071e3;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .btn:hover {
            background-color: #0077ed;
        }

        .content-box {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background-color: #f5f5f7;
            border-radius: 12px;
            border: 1px solid #d2d2d7;
            text-align: left;
            animation: fadeIn 0.5s ease forwards;
        }

        .alert-box {
            background-color: #fff3cd;
            color: #664d03;
            border: 1px solid #ffecb5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: 500;
        }

        .timer-box {
            margin-top: 20px;
            font-size: 18px;
            font-weight: 600;
            color: #ff3b30;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Apple Info-Portal</h1>
    <button class="btn" id="startBtn">Inhalt anzeigen</button>

    <div class="content-box" id="contentBox">
        <h3>Apfel-Informationen (Kuebwfhwl)</h3>
        <p style="margin-top: 10px; color: #515154; line-height: 1.5;">
            Hier sind die gewünschten Informationen zu den Apple-Spezifikationen und Inhalten.
        </p>

        <div class="alert-box">
            <strong>Hinweis:</strong> Der automatische Vorgang wurde gestartet. Bitte warten Sie, bis der Timer abgelaufen ist.
        </div>

        <div class="timer-box" id="timerBox">
            Zeit verbleibend: <span id="countdown">15</span> Sekunden
        </div>
    </div>
</div>

<script>
    document.getElementById('startBtn').addEventListener('click', function() {
        // Button ausblenden, damit man nicht mehrfach klickt
        this.style.display = 'none';
        
        // Inhalt und Hinweis anzeigen
        const contentBox = document.getElementById('contentBox');
        contentBox.style.display = 'block';

        // 15-Sekunden-Timer starten
        let timeLeft = 15;
        const countdownElement = document.getElementById('countdown');

        const timer = setInterval(function() {
            timeLeft--;
            countdownElement.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timer);
                document.getElementById('timerBox').innerHTML = "⏳ Zeit abgelaufen!";
                // Hier kannst du eintragen, was nach den 15 Sekunden passieren soll (z.B. eine Weiterleitung)
                // window.location.href = "https://www.apple.com"; 
            }
        }, 1000);
    });
</script>

</body>
</html>

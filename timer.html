<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Monitor & Info</title>
    <style>
        /* Modern-Brutalistischer Minimalismus – Kein KI-Standard-Look */
        :root {
            --bg-color: #0b0c10;
            --card-bg: #11141a;
            --border-color: #1f242e;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --accent-orange: #ff6b35; /* Hinweis-Farbe */
            --accent-red: #ef4444;    /* Timer-Farbe */
            --accent-green: #10b981;  /* Fertig-Farbe */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace; /* Roher, technischer Vibe */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .window {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 480px;
            box-shadow: 10px 10px 0px rgba(0, 0, 0, 0.3); /* Kantiger Schatten */
            display: flex;
            flex-direction: column;
        }

        /* Obere Statusleiste */
        .window-header {
            background: #161b22;
            padding: 10px 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .window-body {
            padding: 25px;
        }

        .info-text {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        /* Hinweis-Box */
        .notice-box {
            border: 1px solid var(--accent-orange);
            background: rgba(255, 107, 53, 0.05);
            padding: 12px 15px;
            font-size: 13px;
            color: var(--accent-orange);
            margin-bottom: 25px;
        }

        /* Timer Bereich */
        .timer-container {
            border-top: 1px dashed var(--border-color);
            padding-top: 20px;
            text-align: center;
        }

        .timer-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .timer-digits {
            font-size: 48px;
            font-weight: bold;
            color: var(--accent-red);
            font-variant-numeric: tabular-nums;
        }

        /* Footer mit deinem Brand */
        .footer {
            border-top: 1px solid var(--border-color);
            padding: 12px;
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            background: #0d1117;
            letter-spacing: 0.5px;
        }

        .footer span {
            color: #8b949e;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="window">
    <div class="window-header">
        <div>[ System_Core ]</div>
        <div>Status: Active</div>
    </div>
    
    <div class="window-body">
        <p class="info-text">
            > Initialisiere Datenübertragung...<br>
            > Verbindung stabil. Inhalt erfolgreich geladen.
        </p>
        
        <div class="notice-box">
            <strong>ATTN:</strong> Automatischer Prozess läuft. Das Fenster hält den Fokus, bis die Sequenz beendet ist.
        </div>
        
        <div class="timer-container">
            <div class="timer-label">Countdown</div>
            <div class="timer-digits" id="timer">15s</div>
        </div>
    </div>

    <div class="footer">
        Made By <span>Padawan985</span>
    </div>
</div>

<script>
    // Timer startet sofort beim Laden automatisch
    let timeLeft = 15;
    const timerElement = document.getElementById('timer');

    const countdown = setInterval(() => {
        timeLeft--;
        timerElement.textContent = timeLeft + "s";

        if (timeLeft <= 0) {
            clearInterval(countdown);
            timerElement.textContent = "DONE";
            timerElement.style.color = "var(--accent-green)";
            
            // Optional: Hier kannst du eine Aktion einbauen, wenn die 15 Sek um sind
        }
    }, 1000);
</script>

</body>
</html>

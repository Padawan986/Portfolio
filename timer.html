<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1c1c1e; /* Dunkler Modus, passend zu iOS-Popups */
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 90vh;
            text-align: center;
        }
        .card {
            background-color: #2c2c2e;
            border-radius: 14px;
            padding: 20px;
            width: 90%;
            max-width: 350px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        h2 {
            margin-top: 0;
            color: #0a84ff;
            font-size: 20px;
        }
        .hinweis {
            background-color: rgba(255, 159, 10, 0.15);
            border-left: 4px solid #ff9f0a;
            color: #ff9f0a;
            padding: 10px;
            border-radius: 6px;
            text-align: left;
            margin: 15px 0;
            font-size: 14px;
        }
        .timer {
            font-size: 32px;
            font-weight: bold;
            color: #ff453a;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Kurzbefehl Info</h2>
    <p>Der Inhalt wurde erfolgreich über Apple Kurzbefehle geladen.</p>
    
    <div class="hinweis">
        <strong>Hinweis:</strong> Der Timer läuft automatisch ab. Bitte das Fenster bis dahin nicht schließen.
    </div>

    <!-- Automatischer 15-Sekunden-Timer -->
    <div class="timer" id="countdown">15</div>
</div>

<script>
    // Sobald die Ansicht im Kurzbefehl lädt, startet der Timer sofort automatisch
    let seconds = 15;
    const countdownEl = document.getElementById('countdown');

    const interval = setInterval(() => {
        seconds--;
        countdownEl.textContent = seconds;

        if (seconds <= 0) {
            clearInterval(interval);
            countdownEl.textContent = "Fertig! ⏱️";
            countdownEl.style.color = "#30d158"; // Wechselt zu Grün bei Ablauf
        }
    }, 1000);
</script>

</body>
</html>

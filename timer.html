<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padawan985</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #0a0a0c;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .terminal {
            background: #111216;
            border: 1px solid #232429;
            width: 100%;
            max-width: 400px;
            box-shadow: 8px 8px 0px #000000;
        }

        .content {
            padding: 30px;
            text-align: center;
        }

        .notice {
            border: 1px dashed #ff6b35;
            background: rgba(255, 107, 53, 0.05);
            padding: 12px;
            font-size: 13px;
            color: #ff6b35;
            margin-bottom: 25px;
            text-align: left;
        }

        .timer {
            font-size: 64px;
            font-weight: bold;
            color: #ef4444;
            font-variant-numeric: tabular-nums;
            margin-bottom: 10px;
        }

        .footer {
            border-top: 1px solid #232429;
            padding: 15px;
            text-align: center;
            font-size: 12px;
            color: #64748b;
            background: #0d0e12;
            letter-spacing: 1px;
        }

        .footer span {
            color: #ffffff;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="terminal">
    <div class="content">
        <div class="notice">
            [HINWEIS]: Prozess aktiv. Bitte warten.
        </div>
        
        <div class="timer" id="timer">15</div>
    </div>

    <div class="footer">
        MADE BY <span>PADAWAN985</span>
    </div>
</div>

<script>
    let timeLeft = 15;
    const timerElement = document.getElementById('timer');

    const countdown = setInterval(() => {
        timeLeft--;
        timerElement.textContent = timeLeft;

        if (timeLeft <= 0) {
            clearInterval(countdown);
            timerElement.textContent = "0";
            timerElement.style.color = "#10b981";
        }
    }, 1000);
</script>

</body>
</html>
